# EchoChat Redis 开发环境配置

# 绑定所有接口（开发环境，生产环境应只绑定 127.0.0.1）
bind 0.0.0.0

# 关闭保护模式（开发环境）
protected-mode no

# 端口
port 6379

# 持久化：每 60 秒内至少 1 个 key 变更时触发 RDB 快照
save 60 1

# AOF 持久化
appendonly yes
appendfsync everysec

# 最大内存（开发环境 256MB 足够）
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 数据库数量
databases 16
